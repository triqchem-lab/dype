name: Build (cabal)

on:
  push:
    branches:
    - main
    - ci-*
    - release*
    paths: &trigger_path_list
    - '.github/workflows/cabal.yml'
    - 'dype.cabal'
    - 'src/Dayan/**'
  pull_request:
    paths: *trigger_path_list

defaults:
  run:
    shell: bash

jobs:
  auto-cancel:
    if: |
      !contains(github.event.head_commit.message, '[skip ci]')
      && !contains(github.event.head_commit.message, '[ci skip]')
      && !contains(github.event.head_commit.message, '[github skip]')
      && !contains(github.event.head_commit.message, '[skip github]')
    runs-on: ubuntu-latest

    steps:
    - uses: styfle/cancel-workflow-action@0.13.1
      with:
        access_token: ${{ github.token }}

  cabal:
    needs: auto-cancel

    timeout-minutes: 60

    name: Cabal ${{ matrix.description }}, ${{ matrix.ghc-ver }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        description: [Linux]
        ghc-ver: [9.14.1, 9.12.4, 9.10.3, 9.8.4, 9.6.7, 9.4.8, 9.2.8]
        include:
          # macOS with default flags
          - os: macos-26
            description: macOS
            ghc-ver: '9.14.1'
          # Windows with default flags
          - os: windows-2025
            description: Windows
            ghc-ver: '9.14.1'

    env:
      GHC_VER: ${{ matrix.ghc-ver || '9.14.1' }}
      FLAGS:   -O0

    steps:
    - uses: actions/checkout@v7

    - name: Switch off XDG directories for cabal (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p ~/.cabal

    - uses: clearnature/setup@main
      id: setup-haskell
      with:
        ghc-version:   ${{ env.GHC_VER }}
        cabal-version: latest
        cabal-update:  true

    - name: Configure the build plan
      run: |
        # shellcheck disable=SC2086
        cabal build ${FLAGS} --dry-run

    - name: Restore cache from approximate key
      uses: actions/cache/restore@v6
      id: cache
      with:
        path: &cache_path |
          ${{ steps.setup-haskell.outputs.cabal-store }}
        key: ${{ env.key }}-${{ hashFiles('**/plan.json') }}
        restore-keys: ${{ env.key }}
      env:
        key: cabal.yml-${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-${{ steps.setup-haskell.outputs.cabal-version }}

    - name: Install dependencies
      run: |
        # shellcheck disable=SC2086
        cabal build ${FLAGS} --only-dependencies

    - name: Build dype
      run: |
        # shellcheck disable=SC2086
        cabal build ${FLAGS}

    - name: Run tests
      run: |
        # shellcheck disable=SC2086
        cabal test ${FLAGS}

    - name: Run benchmarks
      run: |
        # shellcheck disable=SC2086
        cabal bench ${FLAGS}

    - name: Save cache
      uses: actions/cache/save@v6
      if:   always() && steps.cache.outputs.cache-hit != 'true'
      with:
        key:  ${{ steps.cache.outputs.cache-primary-key }}
        path: *cache_path
