name: Haddock

on:
  push:
    branches:
    - main
    - ci-*
    - release*
    paths: &trigger_path_list
    - 'src/Dayan/**/*.hs'
    - 'dype.cabal'
    - '.github/workflows/haddock.yml'
  pull_request:
    paths: *trigger_path_list
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        ghc-ver: ['9.14.1']

    if: |
      !contains(github.event.head_commit.message, '[skip ci]')
      && !contains(github.event.head_commit.message, '[ci skip]')
      && !contains(github.event.head_commit.message, '[github skip]')
      && !contains(github.event.head_commit.message, '[skip github]')

    runs-on: ${{ matrix.os }}

    env:
      FLAGS: --disable-library-profiling --enable-documentation

    steps:
    - uses: actions/checkout@v7

    - id: setup-haskell
      name: Detect Haskell toolchain
      run: |
        cabal update
        echo "ghc-version=$(ghc --numeric-version)" >> "${GITHUB_OUTPUT}"
        echo "cabal-version=$(cabal --numeric-version)" >> "${GITHUB_OUTPUT}"
        echo "cabal-store=$(cabal path --store-dir)" >> "${GITHUB_OUTPUT}"

    - name: Configure the build plan
      run: |
        # shellcheck disable=SC2086
        cabal configure ${FLAGS}
        cabal build --dry-run

    - name: Cache dependencies
      uses: actions/cache@v6
      id: cache
      with:
        path: |
          ${{ steps.setup-haskell.outputs.cabal-store }}
        key: ${{ env.key }}-plan-${{ hashFiles('**/plan.json') }}
        restore-keys: ${{ env.key }}-
      env:
        key: haddock.yml-${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-${{ steps.setup-haskell.outputs.cabal-version }}

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        cabal build --dependencies-only

    - name: Build Haddock
      run: |
        # shellcheck disable=SC2016
        cabal haddock --haddock-html-location='https://hackage.haskell.org/package/$pkg-$version/docs' --haddock-hyperlink-source --haddock-quickjump

    - name: Prepare to upload built htmls
      run: |
        find dist-newstyle -path '*/doc/html/dype' -type d -exec cp -R {} html/docs \;
        find html -name '*.md' -delete

    - name: Add redirect index.html
      run: |
        cat > html/index.html << 'HTML'
<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="0; url=docs/">
  <title>dype - Da-Yan Proof Engine</title>
</head>
<body>
  <p>Redirecting to <a href="docs/">documentation</a>...</p>
</body>
</html>
HTML

    - name: Deploy haddock
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main'
      with:
        personal_token: ${{ secrets.DEPLOY_TOKEN }}
        publish_dir: html
        force_orphan:  true
